<!-- ══ MAIN NAVBAR ══ -->
<header class="navbar" [class.scrolled]="isScrolled">
  <div class="navbar__inner">

    <!-- Logo image -->
    <a routerLink="/" class="navbar__brand" (click)="closeMenu()">
      <img src="/logo.png" alt="YL Cricket Academy" class="navbar__logo-image" />
    </a>

    <!-- Nav links -->
    <nav class="navbar__nav" id="primary-navigation" [class.is-open]="menuOpen()" aria-label="Main navigation">
      <ul role="list">
        <li *ngFor="let link of navLinks">
          <a
            [routerLink]="link.path"
            routerLinkActive="is-active"
            [routerLinkActiveOptions]="{ exact: link.path === '/' }"
            (click)="closeMenu()"
          >{{ link.label }}</a>
        </li>
      </ul>
      <a routerLink="/contact" class="navbar__enquiry-cta btn" (click)="closeMenu()">Enquiry Now</a>
    </nav>

    <!-- Mobile toggle -->
    <button
      class="navbar__toggle"
      type="button"
      [class.is-open]="menuOpen()"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen()"
      aria-label="Toggle navigation menu"
      aria-controls="primary-navigation"
    >
      <span></span><span></span><span></span>
    </button>
  </div>
</header>
